services:
  mysql:
    image: mysql:8.4
    container_name: mrthue-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mrthue
      MYSQL_USER: mrthue
      MYSQL_PASSWORD: mrthue_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: mrthue-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
        MRTHUE_ADMIN_KEY: ${MRTHUE_ADMIN_KEY:-change-me-in-production}
    container_name: mrthue-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      MRTHUE_ADMIN_KEY: ${MRTHUE_ADMIN_KEY:-change-me-in-production}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
